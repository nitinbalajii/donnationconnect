<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - DonationConnect</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-heart"></i>
                <span>DonationConnect</span>
            </a>
            <nav class="navbar-nav">
                <a href="donate-items.html">Donate Items</a>
                <a href="donate-food.html">Donate Food</a>
                <a href="volunteer.html">Volunteer</a>
                <a href="shelters.html">Shelter Homes</a>
                <a href="about.html">About Us</a>
            </nav>
            <div class="navbar-actions">
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="login.html" class="btn btn-outline">Log In</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Change Password</h1>
                    <p>Update your account password</p>
                </div>

                <div class="auth-body">
                    <div class="form-message"></div>

                    <form id="changePasswordForm">
                        <div class="form-group">
                            <label for="currentPassword" class="form-label">Current Password</label>
                            <input type="password" id="currentPassword" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" id="newPassword" class="form-control" required minlength="6">
                            <small class="form-hint">Minimum 6 characters</small>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Confirm New Password</label>
                            <input type="password" id="confirmPassword" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Change Password</button>
                        <a href="profile.html" class="btn btn-outline btn-block">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; <span class="current-year"></span> DonationConnect India. All rights reserved. | Developed by <span style="font-weight: 500; color: var(--primary);">Nitin Balajee</span></p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!UserState.requireAuth()) return;

            const form = document.getElementById('changePasswordForm');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    showFormMessage('New passwords do not match', 'error');
                    return;
                }

                if (newPassword.length < 6) {
                    showFormMessage('Password must be at least 6 characters', 'error');
                    return;
                }

                try {
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Changing...';
                    submitBtn.disabled = true;

                    const response = await API.auth.updatePassword(currentPassword, newPassword);

                    if (response.success) {
                        showFormMessage('Password changed successfully!', 'success');
                        form.reset();
                        setTimeout(() => {
                            window.location.href = 'profile.html';
                        }, 1500);
                    }
                } catch (error) {
                    showFormMessage(error.message || 'Failed to change password', 'error');
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Change Password';
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
    <script src="js/script.js"></script>
</body>

</html>
